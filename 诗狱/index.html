<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POETRY PRISON / 诗狱</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=ZCOOL+QingKe+HuangYou&family=Noto+Serif+SC:wght@400;700&display=swap');

        /* ========================================================
           🎨 美工替换指南一：关卡背景 (BACKGROUNDS)
           操作方法：注释掉当前的 background 颜色，
           取消注释对应的 url() 路径，并填入你的本地图片路径。
           （确保所有的场景底图比例建议为 900x600 或 800x600）
           ======================================================== */
        .scene-root {
            width: 100%;
            height: 100%;
            position: relative;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            overflow: hidden;
        }

        /* 首页背景 */
        #scene-title { 
            background: linear-gradient(to bottom, #d4dee5 0%, #b8c6cb 60%, #9ba8aa 60%, #7e8b8c 100%); 
            background-image: url('首页.png');
        }
        /* 第一章：车间背景 */
        #scene-ch1 { 
            background: #2c2f33; 
            background-image: url('第一幕_副本.png');
        }
        /* 第二章：诊所背景 */
        #scene-ch2 { 
            background: #1a202c; 
            background-image: url('第二幕.jpg');
        }
        /* 第三章：城中村背景 */
        #scene-ch3 { 
            background: #1a1e24; 
            background-image: url('第三幕.png');
        }
        /* 第四章：出版社/文化工业背景 */
        #scene-ch4 { 
            background: #2c1a1a; 
            background-image: url('第四幕背景.png');
        }
        /* 尾声：真结局深渊背景 */
        #scene-epilogue { 
            background: #0a0a0a; 
            /* background-image: url('assets/bg_epilogue_true.jpg'); */
        }
        /* 尾声：假结局颁奖背景 */
        #fake-ending-scene { 
            background: radial-gradient(circle, #fff 0%, #aaddff 100%); 
            background-image: url('结尾1.png');
            background-size: cover;
            background-position: center;
        }
        
        /* ======================================================== */

        :root {
            --bg-color: #1a1a1a;
            --rust-red: #8b3a3a;
            --sickly-green: #4a5d4e;
            --dirty-blue: #3b4d5e;
            --ui-border: #444;
            --text-main: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Serif SC', serif;
            user-select: none;
            overflow: hidden;
        }

        #game-container {
            width: 900px;
            height: 600px;
            transform-origin: center center;
            background-color: var(--bg-color);
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            border: 3px solid #000;
            overflow: hidden;
            display: flex;
        }

        #scene-layer {
            position: relative;
            width: 900px;
            height: 600px;
            transition: opacity 1s ease;
            overflow: hidden;
            background-color: #1a1a1a;
        }

        #inventory-layer {
            position: relative;
            width: 100px;
            height: 600px;
            background: #000;
            border-left: 4px solid #000;
            display: none;
            flex-direction: column;
            padding: 20px 0;
            box-sizing: border-box;
            gap: 15px;
            align-items: center;
            overflow-y: auto;
            opacity: 1;
            transition: opacity 1s ease;
        }

        .inv-slot {
            width: 70px;
            height: 70px;
            background-color: #d4c4a8;
            border: 3px solid #000;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            box-shadow: inset 0 0 0 3px #d4c4a8, inset 0 0 0 5px #f4e8d4;
            flex-shrink: 0;
        }

        .inv-slot.selected {
            background-color: #e5d8c0;
            border-color: #fff;
            box-shadow: inset 0 0 0 3px #e5d8c0, inset 0 0 0 6px #fff, 0 0 10px rgba(255,255,255,0.5);
        }

        #dialog-layer {
            position: absolute;
            bottom: 15px;
            left: 400px;
            transform: translateX(-50%);
            background: transparent;
            color: #fff;
            padding: 8px 20px;
            border: none;
            font-size: 18px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            text-align: center;
            z-index: 100;
            letter-spacing: 2px;
            max-width: 700px;
            text-shadow: 0 2px 4px rgba(0,0,0,1), 0 0 3px #000, 0 0 6px #000;
        }

        .clickable {
            cursor: pointer;
            position: absolute;
        }
        
        .clickable:hover {
            filter: brightness(1.2) drop-shadow(0 0 5px rgba(255,255,255,0.3));
        }

        .title-text {
            position: absolute;
            top: 100px;
            width: 100%;
            text-align: center;
            font-size: 48px;
            color: #fff;
            letter-spacing: 10px;
            font-weight: bold;
            animation: shake 4s infinite alternate;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .black-cube-title {
            position: absolute;
            top: 250px;
            left: 350px;
            width: 100px;
            height: 100px;
            background: #050505;
            border: 1px solid #333;
            box-shadow: 0 0 30px #000 inset;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .void-eye {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #000, #333, #000);
            animation: spin 3s linear infinite;
            box-shadow: 0 0 10px #000 inset;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes smoke { 0% { transform: scale(1) translateY(0); opacity:0.5; } 100% { transform: scale(2) translateY(-50px); opacity:0; } }
        @keyframes fall { 0% { transform: translateY(0); opacity:1; } 100% { transform: translateY(50px); opacity:0; } }

        .play-square-btn {
            transition: transform 0.1s, background 0.3s;
        }
        .play-square-btn:active {
            transform: scale(0.95);
        }
        .play-square-btn:hover {
            background: rgba(0,0,0,0.1);
        }

        .rusty-jitter {
            animation: rusty-boil 0.8s infinite steps(1);
            transform-origin: center;
        }

        .char-jitter {
            display: inline-block;
            animation: rusty-boil 0.8s infinite steps(1);
            transform-origin: center;
        }
        .char-jitter:nth-child(2n) { animation-delay: -0.2s; animation-duration: 0.9s; }
        .char-jitter:nth-child(3n) { animation-delay: -0.4s; animation-duration: 0.7s; }
        .char-jitter:nth-child(5n) { animation-delay: -0.3s; animation-duration: 1.0s; }

        @keyframes rusty-boil {
            0% { transform: translate(0px, 0px) rotate(0deg); }
            25% { transform: translate(1px, -1px) rotate(0.5deg); }
            50% { transform: translate(-1px, 1px) rotate(-0.5deg); }
            75% { transform: translate(-1px, -1px) rotate(0deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }

        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.8) 120%),
                        linear-gradient(to right, rgba(0,0,0,0.9) 0%, transparent 8%, transparent 92%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
            z-index: 10;
        }

        #modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 50;
            display: none; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #222; border: 2px solid var(--rust-red);
            padding: 20px; text-align: center; color: white;
            position: relative;
            box-sizing: border-box;
            max-height: 95%; 
            overflow-y: auto; 
        }
        .close-modal {
            position: absolute; top: 5px; right: 10px; cursor: pointer; color: #888;
            z-index: 10;
        }

        #cube-reveal-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 200;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
            backdrop-filter: blur(5px);
        }
        .cube-glow {
            width: 110px;
            height: 110px;
            animation: cube-float 4s ease-in-out infinite, cube-glow-anim 2s alternate infinite;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .cube-glow:hover {
            transform: scale(1.1);
        }
        @keyframes cube-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes cube-glow-anim {
            from { filter: drop-shadow(0 0 10px rgba(255,255,255,0.4)); }
            to { filter: drop-shadow(0 0 30px rgba(255,255,255,0.9)); }
        }
        #cube-reveal-text {
            margin-top: 50px;
            color: #fff;
            text-align: center;
            font-size: 18px;
            line-height: 2;
            letter-spacing: 3px;
            font-family: 'Noto Serif SC', serif;
            pointer-events: none;
        }
        .click-to-continue {
            position: absolute;
            bottom: 40px;
            font-size: 14px;
            color: #666;
            letter-spacing: 4px;
            animation: fade-pulse 2s infinite;
            pointer-events: none;
        }
        @keyframes fade-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes popIn {
            0% { transform: scale(0.2); opacity: 0; }
            40% { transform: scale(0.8); opacity: 0.6; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-in {
            animation: popIn 1.2s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        @keyframes rise-up {
            0% { transform: translateY(0) scale(0.3) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-50px) scale(1) rotate(15deg); opacity: 1; }
        }
        .rising-cube {
            animation: rise-up 1.8s ease-out forwards;
        }
        
        .cut-fall {
            transition: all 1.5s ease-in;
            transform-origin: bottom center;
            transform: translateY(10px) rotate(30deg);
            opacity: 0.3;
        }

        @keyframes slide-out-cabinet {
            0% { transform: translateY(0px) scale(0.6); opacity: 0; }
            30% { opacity: 1; }
            80% { transform: translateY(-100px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
        }
        .slide-out {
            animation: slide-out-cabinet 1.5s ease-out forwards;
        }

        @keyframes shock-quake {
            0% { transform: translate(0, 0); filter: blur(0px); }
            10% { transform: translate(-15px, 15px); filter: blur(3px); }
            20% { transform: translate(15px, -15px); filter: blur(6px); }
            30% { transform: translate(-10px, -15px); filter: blur(3px); }
            40% { transform: translate(15px, 10px); filter: blur(7px); }
            50% { transform: translate(-5px, 15px); filter: blur(4px); }
            60% { transform: translate(10px, -5px); filter: blur(8px); }
            70% { transform: translate(-10px, -10px); filter: blur(3px); }
            80% { transform: translate(5px, 5px); filter: blur(1px); }
            90% { transform: translate(-2px, 2px); filter: blur(0px); }
            100% { transform: translate(0, 0); filter: blur(0px); }
        }
        .shock-effect {
            animation: shock-quake 1.8s ease-in-out forwards;
        }

        #knowledge-panel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 210;
            display: none;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            opacity: 0;
            transition: opacity 0.8s ease;
            padding: 50px 40px; 
            box-sizing: border-box;
            overflow: hidden;
        }
        .knowledge-content {
            width: 100%;
            max-width: 820px; 
            color: #ccc;
            font-family: 'Noto Serif SC', serif;
            line-height: 2.2;
            font-size: 16px;
            letter-spacing: 1.5px;
            text-align: justify;
            height: 380px; 
            overflow-y: auto;
            padding-right: 10px;
        }
        .knowledge-title {
            color: #d4c4a8;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 5px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            width: 100%;
            max-width: 820px; 
        }
        .close-knowledge {
            position: absolute;
            bottom: 40px; 
            padding: 10px 30px;
            border: 1px solid #555;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            letter-spacing: 3px;
        }
        .close-knowledge:hover {
            border-color: #fff; color: #fff; background: rgba(255,255,255,0.1);
        }
        
        .know-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            color: #555;
            cursor: pointer;
            padding: 20px;
            transition: color 0.3s;
            user-select: none;
        }
        .know-nav-btn:hover { color: #fff; }
        #know-prev { left: 15px; } 
        #know-next { right: 15px; } 
        #know-page-indicator {
            position: absolute;
            bottom: 105px;
            font-size: 14px;
            color: #666;
            letter-spacing: 2px;
            font-family: monospace;
        }

        #chapter-intro-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 300;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
            cursor: pointer;
        }
        .chapter-title {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 50px;
            letter-spacing: 5px;
            text-align: center;
            line-height: 1.5;
        }
        .chapter-poem {
            font-size: 20px;
            line-height: 2.2;
            letter-spacing: 4px;
            text-align: center;
            color: #ccc;
            font-style: italic;
        }

        #reveal-paper-icon {
            width: 45px;
            height: 60px;
            background: #f4e8d4;
            border: 1px solid #ccc;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            cursor: pointer;
            display: none;
            z-index: 205;
            transform: rotate(15deg);
            transition: transform 0.3s, box-shadow 0.3s;
            flex-shrink: 0; 
        }
        #reveal-paper-icon:hover {
            transform: rotate(0deg) scale(1.1);
            box-shadow: 0 0 15px rgba(255,255,255,0.6);
        }
        .paper-lines {
            width: 70%; height: 2px; background: #bbaaaa; margin: 10px auto;
        }

        #poem-reading-panel {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); z-index: 250;
            display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.5s;
        }
        .poem-paper {
            background: #f4e8d4; width: 450px; padding: 50px 40px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            color: #2c2621; font-family: 'Noto Serif SC', serif;
            font-size: 20px; line-height: 2.2; white-space: pre-wrap;
            position: relative;
            background-image: repeating-linear-gradient(to bottom, transparent, transparent 42px, rgba(0,0,0,0.05) 43px, rgba(0,0,0,0.05) 44px);
        }
        .close-poem-btn {
            position: absolute; top: 15px; right: 20px;
            font-size: 24px; cursor: pointer; color: #8b3a3a;
            transition: transform 0.2s;
        }
        .close-poem-btn:hover { transform: scale(1.2); }

        #rotate-tip {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: 'Noto Serif SC', serif;
            font-size: 18px;
            letter-spacing: 3px;
            text-align: center;
            gap: 20px;
        }
        @media (orientation: portrait) {
            #rotate-tip { display: flex; }
        }
        @media (orientation: landscape) {
            #rotate-tip { display: none; }
        }

    </style>
</head>
<body>

<div id="rotate-tip">
    <div style="font-size:48px;">↻</div>
    <div>请旋转手机至横屏</div>
    <div style="font-size:14px; color:#666; margin-top:10px;">Please rotate your device to landscape</div>
</div>
<div id="game-container">
    <div id="scene-layer"></div>
    <div id="inventory-layer"></div>
    <div id="bgm-btn" onclick="toggleBgm()" style="position:absolute; bottom:8px; right:8px; z-index:1000; cursor:pointer; width:28px; height:28px; opacity:0.6; transition:opacity 0.2s;" title="背景音乐开关">
        <svg id="bgm-icon-on" viewBox="0 0 24 24" fill="#fff" style="width:100%;height:100%;">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
        </svg>
        <svg id="bgm-icon-off" viewBox="0 0 24 24" fill="#fff" style="width:100%;height:100%;display:none;">
            <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
        </svg>
    </div>
    <div id="dialog-layer"></div>
    
    <div id="modal">
        <div class="modal-content" id="modal-inner">
            <span class="close-modal" onclick="closeModal()">✖</span>
            <div id="modal-body"></div>
        </div>
    </div>
    
    <div id="cube-reveal-layer">
        <div style="display: flex; justify-content: center; align-items: center; gap: 50px;">
            <div id="reveal-cube-svg" class="cube-glow"></div>
            <div id="reveal-paper-icon" title="阅读附带的纸条">
                <div style="margin-top:10px;">
                    <div class="paper-lines"></div><div class="paper-lines"></div><div class="paper-lines"></div>
                </div>
            </div>
        </div>
        <div id="cube-reveal-text"></div>
        <div id="cube-reveal-hint" style="margin-top: 15px; font-size: 12px; color: #8b3a3a; letter-spacing: 2px;">[ 点击方块以查阅理论档案 ]</div>
        <!-- 增加了 id，用于动态修改提示文字 -->
        <div class="click-to-continue" id="cube-reveal-close-text">- 点击空白处收入行囊 -</div>
    </div>

    <div id="poem-reading-panel">
        <div class="poem-paper">
            <div class="close-poem-btn" id="close-poem-btn">✖</div>
            <div id="poem-paper-content"></div>
        </div>
    </div>

    <div id="knowledge-panel">
        <div class="knowledge-title" id="knowledge-title-text"></div>
        <div class="knowledge-content" id="knowledge-text"></div>
        
        <div id="know-prev" class="know-nav-btn">◀</div>
        <div id="know-next" class="know-nav-btn">▶</div>
        <div id="know-page-indicator"></div>

        <div class="close-knowledge" id="close-knowledge-btn">合上并继续</div>
    </div>
    
    <div id="chapter-intro-layer">
        <div class="chapter-title" id="chapter-intro-title"></div>
        <div class="chapter-poem" id="chapter-intro-poem"></div>
        <div class="click-to-continue" style="display:block;">- 点击屏幕进入 -</div>
    </div>
</div>

<script>
    const state = {
        inventory: [],
        selectedItem: null,
        currentScene: 'title',
        flags: {
            ch1_clockFixed: false,
            ch1_rustComplete: false,
            ch1_cubeTaken: false,
            
            ch2_xrayPlaced: false,
            ch2_yarnExtracted: false,
            ch2_houseBuilt: false,
            ch2_doorOpened: false,
            ch2_cubeTaken: false,
            
            ch3_dialed: false,
            ch3_watered: false,
            ch3_grown: false,
            ch3_cubeTaken: false,
            
            ch4_bookMade: false,
            ch4_bookTaken: false,
            ch4_keyTaken: false,
            epilogue_rejected: false 
        }
    };

    /* ========================================================

            knowTitleText.innerHTML = archiveTitle;

            hintText.style.display = 'block';

            };
        } else {
            paperIcon.style.display = 'none';
        }

        layer.style.display = 'flex';
        void layer.offsetWidth;
        layer.style.opacity = 1;
        cubeEl.style.opacity = '0';
        cubeEl.style.transition = 'opacity 1.5s ease 0.5s';
        setTimeout(() => { cubeEl.style.opacity = '1'; }, 50);

        layer.onclick = null;
        cubeEl.onclick = null;
        closeKnowBtn.onclick = null;
        btnPrev.onclick = null;
        btnNext.onclick = null;

        layer.onclick = (e) => {
            if (e.target === layer) {
                closeReveal();
            }
        };

        btnPrev.onclick = () => { if (currentPage > 0) { currentPage--; renderPage(); } };
        btnNext.onclick = () => { if (currentPage < knowledgePages.length - 1) { currentPage++; renderPage(); } };

        if (knowledgePages && knowledgePages.length > 0) {
            cubeEl.onclick = (e) => {
                e.stopPropagation();
                knowPanel.style.display = 'flex';
                void knowPanel.offsetWidth;
                knowPanel.style.opacity = 1;
            };
        }

        closeKnowBtn.onclick = () => {
            knowPanel.style.opacity = 0;
            setTimeout(() => {
                knowPanel.style.display = 'none';
                closeReveal();
            }, 800);
        };

        closePoemBtn.onclick = (e) => {
            e.stopPropagation();
            poemPanel.style.opacity = 0;
            setTimeout(() => { poemPanel.style.display = 'none'; }, 500);
        };
        poemPanel.onclick = (e) => {

                e.stopPropagation();
                poemPanel.style.opacity = 0;
                setTimeout(() => { poemPanel.style.display = 'none'; }, 500);
            }
        };

        function closeReveal() {
            layer.style.opacity = 0;
            setTimeout(() => {
                layer.style.display = 'none';
                if(onComplete) onComplete();
            }, 1000);
        }
    }

    function addToInventory(itemKey) {
        if (!state.inventory.includes(itemKey)) {
            state.inventory.push(itemKey);
            new Audio('拾取物品.mp3').play();
            renderInventory();
            showMsg(`获得：${itemsData[itemKey].name}`);
        }
    }

    function removeFromInventory(itemKey) {
        const idx = state.inventory.indexOf(itemKey);
        if (idx > -1) {
            state.inventory.splice(idx, 1);
            if (state.selectedItem === itemKey) state.selectedItem = null;
            renderInventory();
        }
    }

    function renderInventory() {
        const invLayer = document.getElementById('inventory-layer');
        invLayer.innerHTML = '';
        const maxSlots = 6;
        
        for (let i = 0; i < maxSlots; i++) {
            const slot = document.createElement('div');
            const item = state.inventory[i];
            
            slot.className = 'inv-slot';
            if (item) {
                if (state.selectedItem === item) {
                    slot.classList.add('selected');
                }
                const svgStr = itemsData[item].svg;
                if (svgStr.startsWith('<img')) {
                    slot.innerHTML = svgStr;
                } else {
                    // 用DOMParser解析SVG，避免Mac Safari的innerHTML渲染问题
                    try {
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(svgStr, 'image/svg+xml');
                        const svgEl = doc.documentElement;
                        svgEl.style.width = '100%';
                        svgEl.style.height = '100%';
                        slot.appendChild(svgEl);
                    } catch(e) {
                        slot.innerHTML = svgStr;
                    }
                }
                slot.onclick = () => handleInventoryClick(item);
            }
            invLayer.appendChild(slot);
        }
    }

    function handleInventoryClick(itemKey) {
        if (state.selectedItem === null) {
            state.selectedItem = itemKey;
        } else if (state.selectedItem === itemKey) {
            state.selectedItem = null;
        } else {
            const comboKey = state.selectedItem + '+' + itemKey;
            if (combinations[comboKey]) {
                const newItem = combinations[comboKey];
                removeFromInventory(state.selectedItem);
                removeFromInventory(itemKey);
                addToInventory(newItem);
                showMsg(`组合成了：${itemsData[newItem].name}`);
                state.selectedItem = null;
            } else {
                state.selectedItem = itemKey;
            }
        }
        renderInventory();

        // 🌟 新增功能：点击物品栏里的理论方块时，随时弹回查阅档案！
        // 在第四章（ch4）为了方便选中并交给猫头鹰男，屏蔽弹窗讲解
        // 只有在 archiveData 中注册的物品（黑、红、白方块）才会弹出讲解
        if (archiveData[itemKey] && state.currentScene !== 'ch4') {
            const data = archiveData[itemKey];
            revealCube(
                itemKey,
                data.title,
                data.desc,
                data.archiveTitle,
                data.pages,
                data.poem,
                null // 传入 null 代表这只是一次重温查阅，不需要触发“收集”的回调逻辑
            );
        }
    }

    function useItem(expectedItem, successCb, failMsg = "似乎没用。") {
        if (state.selectedItem === expectedItem) {
            removeFromInventory(expectedItem);
            successCb();
        } else if (state.selectedItem) {
            showMsg(failMsg);
        }
    }

    function checkItem(expectedItem) {
        return state.selectedItem === expectedItem;
    }

    function consumeItem(item) {
        removeFromInventory(item);
    }

    function openModal(contentHtml, onClose = null) {

        const introLayer = document.getElementById('chapter-intro-layer');
        const titleEl = document.getElementById('chapter-intro-title');
        const poemEl = document.getElementById('chapter-intro-poem');
        
        titleEl.innerHTML = title;

    function loadScene(sceneName) {
        if (sceneName !== 'title' && sceneName !== 'prologue') {
            const keepItems = ['black_cube1', 'red_cube', 'white_cube', 'match', 'poetry_book', 'burned_book', 'gold_key'];
            state.inventory = state.inventory.filter(item => keepItems.includes(item));
        }

        state.currentScene = sceneName;
        state.selectedItem = null;
        renderInventory();
        const layer = document.getElementById('scene-layer');
        const invLayer = document.getElementById('inventory-layer');
        
        layer.style.opacity = 0;
        invLayer.style.opacity = 0; 
        
        setTimeout(() => {
            if (sceneName === 'title' || sceneName === 'prologue') {
                layer.style.width = '900px';
                invLayer.style.display = 'none';
            } else {
                layer.style.width = '800px';
                invLayer.style.display = 'flex';
            }

            layer.innerHTML = scenes[sceneName].html;
            layer.innerHTML += '<div class="vignette"></div>';
            if(scenes[sceneName].init) scenes[sceneName].init();
            
            const introData = scenes[sceneName].intro;
            if (introData) {
                showChapterIntro(introData.title, introData.poem, () => {
                    layer.style.opacity = 1;
                    invLayer.style.opacity = 1; 
                });
            } else {
                layer.style.opacity = 1;
                if (sceneName !== 'title' && sceneName !== 'prologue') {

                }

                    document.getElementById('ch2-tweezers').onclick = function() { addToInventory('tweezers'); this.style.display='none'; };
                } else { document.getElementById('ch2-tweezers').style.display='none'; }

                if(!state.inventory.includes('needle') && !state.flags.ch2_houseBuilt) {
                    document.getElementById('ch2-needle').onclick = function() { addToInventory('needle'); this.style.display='none'; };
                } else { document.getElementById('ch2-needle').style.display='none'; }

                const cabinet = document.getElementById('ch2-cabinet');
                const lightbox = document.getElementById('ch2-lightbox');
                const xrayView = document.getElementById('ch2-xray-view');
                const lungsYarn = document.getElementById('ch2-lungs-yarn');
                const house = document.getElementById('ch2-mini-house');
                const door = document.getElementById('ch2-cabinet-door');
                if(state.flags.ch2_xrayPlaced) {
                    xrayView.style.display = 'block';
                    if(state.flags.ch2_yarnExtracted) {
                        lungsYarn.style.display = 'none';

                }

                cabinet.onclick = () => {

                    setTimeout(() => {
                        window.openCabinetView();
                    }, 600);
                };

                lightbox.onclick = () => {
                    if(!state.flags.ch2_xrayPlaced) {
                        useItem('xray', () => {
                            state.flags.ch2_xrayPlaced = true;
                            xrayView.style.display = 'block';
                            showMsg("透光显示，肺部的阴影并非病变，而是密密麻麻的'毛绒'。");
                        }, "灯光刺眼，需要挂上什么东西。");
                    } else if(!state.flags.ch2_yarnExtracted) {
                        useItem('tweezers', () => {
                            state.flags.ch2_yarnExtracted = true;
                            lungsYarn.style.display = 'none';
                            lightbox.querySelector('#ch2-xray-view img').src = 'x光片更新.png';
                            addToInventory('lung_yarn');
                            addToInventory('tweezers'); 
                            showMsg("镊子穿透了平面，从X光片里夹出了实体毛线。");
                        }, "隔着胶片拿不到，需要精细的工具。");
                    }
                };

                let isShocking = false; 
                
                function triggerShockEffect(onComplete) {
                    if (isShocking) return;
                    isShocking = true;
                    state.flags.ch2_doorOpened = true;
                    
                    const door = house.querySelector('.factory-door');
                    if (door) door.style.transform = 'scaleX(0)'; 
                    
                    const sceneLayer = document.getElementById('scene-layer');
                    sceneLayer.classList.add('shock-effect'); 
                    
                    showMsg("厂房门突然敞开！一股夹杂着粉尘与血腥的轰鸣震颤了世界...");
                    
                    setTimeout(() => {
                        sceneLayer.classList.remove('shock-effect');
                        isShocking = false;
                        if (onComplete) onComplete();
                    }, 1800);
                }

                function openRedCube() {
                    const data = archiveData['red_cube'];
                    // 重构：直接调用统一存储的数据
                    revealCube(
                        'red_cube', 
                        data.title, 
                        data.desc, 
                        data.archiveTitle, 
                        data.pages, 
                        data.poem,
                        () => {
                            state.flags.ch2_cubeTaken = true;
                            addToInventory('red_cube');
                            showMsg("从敞开的厂房门中，飘出了沉甸甸的生命代价。");
                        }
                    );
                }

                const checkBuilding = setInterval(() => {
                    if(state.currentScene === 'ch2' && !state.flags.ch2_houseBuilt && state.inventory.includes('mini_building')) {
                        clearInterval(checkBuilding); 
                        consumeItem('mini_building');
                        state.flags.ch2_houseBuilt = true;
                        
                        house.style.display = 'block';
                        house.style.opacity = '0';
                        house.style.transform = 'scale(0.2)';
                        house.style.transition = 'opacity 0.8s ease, transform 0.8s cubic-bezier(0.34, 1.2, 0.64, 1)';
                        setTimeout(() => {
                            house.style.opacity = '1';
                            house.style.transform = 'scale(1)';
                        }, 50);
                        showMsg("绣花针牵引着毛线飞速穿梭，化作一座微缩的废弃厂房落在桌上。");
                        
                        window.ch2_autoOpenTimer = setTimeout(() => {
                            if (!state.flags.ch2_doorOpened) {
                                triggerShockEffect();
                            }
                        }, 2500);
                    }
                }, 1000);

                if(state.flags.ch2_houseBuilt) {
                    house.style.display = 'block';
                    if (state.flags.ch2_doorOpened) {
                        const door = house.querySelector('.factory-door');
                        if (door) door.style.transform = 'scaleX(0)'; 
                    }
                }

                house.onclick = () => {
                    if (!state.flags.ch2_houseBuilt || state.flags.ch2_cubeTaken || isShocking) return;

                    if (!state.flags.ch2_doorOpened) {
                        clearTimeout(window.ch2_autoOpenTimer);
                        triggerShockEffect(() => { openRedCube(); });
                    } else {
                        openRedCube();
                    }
                };
            }
        },

            setTimeout(() => {
                addToInventory('xray');
                showMsg("找到了伍春兰的病理档案（X光片）。");
                window.openCabinetView();
            }, 500);
        }
    };

    loadScene('title');

    // 背景音乐：用户首次交互后自动播放
    const bgm = new Audio('背景音.mp3');
    bgm.loop = true;
    bgm.volume = 0.3;
    let bgmStarted = false;
    const startBgm = () => {
        if (!bgmStarted) { bgm.play(); bgmStarted = true; }
        document.removeEventListener('click', startBgm);
    };
    document.addEventListener('click', startBgm);

    window.toggleBgm = function() {
        if (bgm.paused) {
            bgm.play();
            document.getElementById('bgm-icon-on').style.display = 'block';
            document.getElementById('bgm-icon-off').style.display = 'none';
        } else {
            bgm.pause();
            document.getElementById('bgm-icon-on').style.display = 'none';
            document.getElementById('bgm-icon-off').style.display = 'block';
        }
    };

    function scaleGame() {
        const container = document.getElementById('game-container');
        const scaleX = window.innerWidth / 900;
        const scaleY = window.innerHeight / 600;
        const scale = Math.min(scaleX, scaleY);
        container.style.transform = `scale(${scale})`;
    }
    scaleGame();
    window.addEventListener('resize', scaleGame);
    window.addEventListener('orientationchange', () => setTimeout(scaleGame, 300));

</script>
</body>
</html>
